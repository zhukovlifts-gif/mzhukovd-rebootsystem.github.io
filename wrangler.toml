name = "reboot-form"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# KV namespace для rate limiting (необов'язково, але рекомендовано)
# Створи KV namespace: wrangler kv:namespace create "RATE_LIMIT_KV"
# Потім розкоментуй і встав правильний id:
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "ВСТАВИТИ_ID_NAMESPACE"
